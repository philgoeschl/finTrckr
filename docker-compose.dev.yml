services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://fintrckr:${POSTGRES_PASSWORD:-devpassword}@db:5432/fintrckr
      NODE_ENV: development

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fintrckr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: fintrckr
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrckr"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata_dev:
    name: fintrckr_pgdata_dev
