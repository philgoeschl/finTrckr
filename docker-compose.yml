services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://fintrckr:${POSTGRES_PASSWORD}@db:5432/fintrckr
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "node ./node_modules/prisma/bin/prisma.js migrate deploy && node server.js"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fintrckr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: fintrckr
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrckr"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
    name: fintrckr_pgdata
